name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Format check
        run: npm run format:check

      - name: Knip (unused code)
        run: npx knip

  shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w packages/shared

      - name: Upload shared dist
        uses: actions/upload-artifact@v5
        with:
          name: shared-dist
          path: packages/shared/dist/
          retention-days: 1

  server:
    needs: shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download shared dist
        uses: actions/download-artifact@v5
        with:
          name: shared-dist
          path: packages/shared/dist/

      - name: Typecheck server
        run: npm run typecheck -w packages/server

      - name: Build server
        run: npm run build -w packages/server

      - name: Test server
        run: npm run test -w packages/server

  client:
    needs: shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download shared dist
        uses: actions/download-artifact@v5
        with:
          name: shared-dist
          path: packages/shared/dist/

      - name: Build client
        run: npm run build -w packages/client

  docker:
    needs: [quality, server, client]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: quay.io/mschatzm/cnv-ui-monitor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
