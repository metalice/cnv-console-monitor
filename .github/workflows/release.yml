name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w packages/shared

      - name: Typecheck server
        run: npm run typecheck -w packages/server

      - name: Build server
        run: npm run build -w packages/server

      - name: Test server
        run: npm run test -w packages/server

      - name: Build client
        run: npm run build -w packages/client

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            quay.io/openshift-cnv/cnv-console-monitor:${{ steps.version.outputs.VERSION }}
            quay.io/openshift-cnv/cnv-console-monitor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
            echo "## Changes since $PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            git log --oneline "$PREV_TAG"..HEAD --no-merges >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "## Docker Image" >> "$GITHUB_OUTPUT"
            echo "\`quay.io/openshift-cnv/cnv-console-monitor:${GITHUB_REF_NAME#v}\`" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
            echo "## Docker Image" >> "$GITHUB_OUTPUT"
            echo "\`quay.io/openshift-cnv/cnv-console-monitor:${GITHUB_REF_NAME#v}\`" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.NOTES }}
          generate_release_notes: true
