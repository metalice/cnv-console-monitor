apiVersion: v1
kind: ConfigMap
metadata:
  name: cnv-ui-monitor-config
  labels:
    app: cnv-ui-monitor
data:
  DASHBOARD_PORT: "8080"
  AUTH_ENABLED: "true"
  POLL_INTERVAL_MINUTES: "15"
  INITIAL_LOOKBACK_DAYS: "180"
  TZ: "Asia/Jerusalem"
  SMTP_PORT: "587"
  EMAIL_FROM: "cnv-ui-monitor@redhat.com"
  REPORTPORTAL_URL: "https://reportportal-cnv.apps.dno.ocp-hub.prod.psi.redhat.com"
  REPORTPORTAL_PROJECT: "CNV"
