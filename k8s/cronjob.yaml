apiVersion: batch/v1
kind: CronJob
metadata:
  name: cnv-ui-monitor-poll
  labels:
    app: cnv-ui-monitor
spec:
  schedule: "0 7 * * *"
  timeZone: "Asia/Jerusalem"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: cnv-ui-monitor
            component: poller
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: poller
              image: quay.io/mschatzm/cnv-ui-monitor:latest
              securityContext:
                runAsUser: 1001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command: ["node", "packages/server/dist/index.js"]
              envFrom:
                - configMapRef:
                    name: cnv-ui-monitor-config
                - secretRef:
                    name: cnv-ui-monitor-secrets
              env:
                - name: DASHBOARD_URL
                  valueFrom:
                    configMapKeyRef:
                      name: cnv-ui-monitor-config
                      key: DASHBOARD_URL
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
