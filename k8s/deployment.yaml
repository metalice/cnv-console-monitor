apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnv-ui-monitor
  labels:
    app: cnv-ui-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cnv-ui-monitor
  template:
    metadata:
      labels:
        app: cnv-ui-monitor
    spec:
      serviceAccountName: cnv-ui-monitor
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth-proxy
          image: registry.redhat.io/openshift4/ose-oauth-proxy:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8443
              name: proxy
          args:
            - --https-address=:8443
            - --provider=openshift
            - --openshift-service-account=cnv-ui-monitor
            - --upstream=http://localhost:8080
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret=$(OAUTH_COOKIE_SECRET)
            - --pass-user-headers
          env:
            - name: OAUTH_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: cnv-ui-monitor-secrets
                  key: OAUTH_COOKIE_SECRET
          volumeMounts:
            - mountPath: /etc/tls/private
              name: proxy-tls
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

        - name: dashboard
          image: quay.io/mschatzm/cnv-ui-monitor:latest
          securityContext:
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["node", "packages/server/dist/serve.js"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: cnv-ui-monitor-config
            - secretRef:
                name: cnv-ui-monitor-secrets
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/gcp/key.json
          volumeMounts:
            - mountPath: /etc/gcp
              name: gcp-credentials
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: proxy-tls
          secret:
            secretName: cnv-ui-monitor-tls
        - name: gcp-credentials
          secret:
            secretName: gcp-credentials
            optional: true
