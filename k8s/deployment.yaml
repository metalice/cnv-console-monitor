apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnv-ui-monitor
  labels:
    app: cnv-ui-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cnv-ui-monitor
  template:
    metadata:
      labels:
        app: cnv-ui-monitor
    spec:
      containers:
        - name: dashboard
          image: quay.io/mschatzm/cnv-ui-monitor:latest
          command: ["node", "packages/server/dist/serve.js"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: cnv-ui-monitor-config
            - secretRef:
                name: cnv-ui-monitor-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
