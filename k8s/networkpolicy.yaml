apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnv-ui-monitor
  labels:
    app: cnv-ui-monitor
spec:
  podSelector:
    matchLabels:
      app: cnv-ui-monitor
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8443
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 587
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
