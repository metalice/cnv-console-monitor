apiVersion: v1
kind: Service
metadata:
  name: postgresql
  labels:
    app: cnv-ui-monitor
    component: postgresql
spec:
  selector:
    app: cnv-ui-monitor
    component: postgresql
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  labels:
    app: cnv-ui-monitor
    component: postgresql
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: cnv-ui-monitor
      component: postgresql
  template:
    metadata:
      labels:
        app: cnv-ui-monitor
        component: postgresql
    spec:
      containers:
        - name: postgresql
          image: docker.io/library/postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: cnv_monitor
            - name: POSTGRES_USER
              value: cnv_monitor
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cnv-ui-monitor-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "cnv_monitor"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "cnv_monitor"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
