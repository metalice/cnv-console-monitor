apiVersion: v1
kind: Secret
metadata:
  name: cnv-ui-monitor-secrets
  labels:
    app: cnv-ui-monitor
type: Opaque
stringData:
  REPORTPORTAL_TOKEN: "<your-reportportal-api-token>"
  SLACK_WEBHOOK_URL: "<your-slack-webhook-url>"
  SMTP_HOST: "smtp.corp.redhat.com"
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  JIRA_URL: "<your-jira-url>"
  JIRA_TOKEN: "<your-jira-token>"
  POSTGRES_PASSWORD: "<choose-a-strong-password>"
  DATABASE_URL: "postgresql://cnv_monitor:<same-password>@postgresql:5432/cnv_monitor"
